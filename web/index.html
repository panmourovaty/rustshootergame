<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rust Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas#bevy {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;      /* prevent focus ring on click-to-grab */
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4d1a;
      font-family: monospace;
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      user-select: none;
      pointer-events: none;
    }

    #loading::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%   { content: '';   }
      25%  { content: '.';  }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">LOADING</div>
  <canvas id="bevy"></canvas>

  <script type="module">
    import init from './client.js';

    // Load server.txt — if present and non-empty, the in-game server address
    // field is hidden and this value is used directly (like RSG_SERVER_ADDR on
    // native builds).  A 404 or empty file simply shows the address field.
    try {
      const res = await fetch('./server.txt');
      if (res.ok) {
        const addr = (await res.text()).trim();
        if (addr) {
          window.__RSG_SERVER_ADDR__ = addr;
          console.log('[RSG] server address locked to', addr);
        }
      }
    } catch (_) {
      // Network error or file absent — ignore, address field will be shown.
    }

    try {
      await init();
    } catch (e) {
      console.error('Failed to initialise WASM:', e);
      document.getElementById('loading').textContent = 'Failed to load. Check console.';
    }

    document.getElementById('loading')?.remove();
  </script>
</body>
</html>
