name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: rustgame

jobs:
  build-windows:
    name: Build Windows (DirectX12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Windows SDK
        run: |
          choco install -y windows-sdk-10
        shell: pwsh

      - name: Build Release
        run: cargo build --release --target x86_64-pc-windows-msvc --features dx12

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: target/x86_64-pc-windows-msvc/release/${{ env.APP_NAME }}.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: target/x86_64-pc-windows-msvc/release/${{ env.APP_NAME }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x64:
    name: Build Linux Vulkan x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Build Release
        run: cargo build --release --target x86_64-unknown-linux-gnu --features vulkan

      - name: Create Tarball
        run: |
          mkdir -p release/linux-x64
          cp target/x86_64-unknown-linux-gnu/release/${{ env.APP_NAME }} release/linux-x64/
          tar -czvf ${{ env.APP_NAME }}-linux-x64.tar.gz -C release/linux-x64 ${{ env.APP_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: ${{ env.APP_NAME }}-linux-x64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APP_NAME }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux Vulkan arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Set environment variables
        run: |
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build Release
        run: cargo build --release --target aarch64-unknown-linux-gnu --features vulkan

      - name: Create Tarball
        run: |
          mkdir -p release/linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/${{ env.APP_NAME }} release/linux-arm64/
          tar -czvf ${{ env.APP_NAME }}-linux-arm64.tar.gz -C release/linux-arm64 ${{ env.APP_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: ${{ env.APP_NAME }}-linux-arm64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APP_NAME }}-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build MacOS (Metal)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release --target aarch64-apple-darwin --features metal
          strip -x target/aarch64-apple-darwin/release/${{ env.APP_NAME }}

      - name: Create Tarball
        run: |
          mkdir -p release/macos-arm64
          cp target/aarch64-apple-darwin/release/${{ env.APP_NAME }} release/macos-arm64/
          tar -czvf ${{ env.APP_NAME }}-macos-arm64.tar.gz -C release/macos-arm64 ${{ env.APP_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: ${{ env.APP_NAME }}-macos-arm64.tar.gz

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APP_NAME }}-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}