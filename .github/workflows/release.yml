name: Release

on:
  push:

permissions:
  contents: write
  deployments: write

# ── Required GitHub Secrets ───────────────────────────────────────────────────
#
#   CLOUDFLARE_API_TOKEN      Cloudflare API token with
#                             "Cloudflare Pages: Edit" permission.
#                             Create at https://dash.cloudflare.com/profile/api-tokens
#
#   CLOUDFLARE_ACCOUNT_ID     Your Cloudflare account ID.
#                             Visible in the right-hand sidebar of any zone
#                             or at https://dash.cloudflare.com → select account.
#
#   CLOUDFLARE_PAGES_PROJECT  Name of the Cloudflare Pages project to deploy to.
#                             Create the project once at
#                             https://dash.cloudflare.com → Pages → Create a project
#                             (choose "Direct Upload" — CI will handle all uploads).
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Native binaries (client + server) ───────────────────────────────────────
  build-native:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Client — Windows x86-64 (x86-64-v3) ─────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: client
            artifact_name: client.exe
            asset_name: client-windows-x86_64.exe
            rustflags: "-C target-cpu=x86-64-v3"

          # ── Client — Linux x86-64 SSE2 baseline (SSE fallback) ──────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-amd64
            rustflags: ""

          # ── Client — Linux x86-64 x86-64-v3 ────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-amd64-v3
            rustflags: "-C target-cpu=x86-64-v3"

          # ── Client — Linux ARM64 NEON baseline (NEON fallback) ──────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-arm64
            rustflags: ""

          # ── Client — Linux ARM64 SVE ─────────────────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-arm64-sve
            rustflags: "-C target-feature=+sve,+sve2,+neon"

          # ── Client — macOS Apple Silicon (NEON; no SVE on Apple chips) ───────
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: client
            artifact_name: client
            asset_name: client-macos-arm64
            rustflags: ""

          # ── Server — Linux x86-64 SSE2 baseline ─────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-amd64
            rustflags: ""

          # ── Server — Linux x86-64 x86-64-v3 ────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-amd64-v3
            rustflags: "-C target-cpu=x86-64-v3"

          # ── Server — Linux ARM64 NEON baseline ──────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-arm64
            rustflags: ""

          # ── Server — Linux ARM64 SVE ─────────────────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-arm64-sve
            rustflags: "-C target-feature=+sve,+sve2,+neon"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.binary }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libvulkan-dev \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            pkg-config

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: >
          cargo build
          --release
          --target ${{ matrix.target }}
          --bin ${{ matrix.binary }}
          ${{ matrix.binary == 'server' && '--no-default-features --features server' || '' }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item `
            "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" `
            "${{ matrix.asset_name }}"

      - name: Upload build artefact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  # ── WASM web client ──────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM web client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-client

      - name: Build WASM binary
        run: >
          cargo build
          --profile wasm-release
          --target wasm32-unknown-unknown
          --bin client
          --no-default-features
          --features web

      - name: Install wasm-bindgen-cli (version matched to Cargo.lock)
        run: |
          VER=$(grep -A2 'name = "wasm-bindgen"' Cargo.lock \
                | grep 'version' | head -1 | cut -d'"' -f2)
          echo "Installing wasm-bindgen-cli $VER"
          cargo install wasm-bindgen-cli --version "=$VER" --locked

      - name: Generate JS bindings
        run: |
          mkdir -p web-dist
          wasm-bindgen \
            --out-dir web-dist \
            --target web \
            target/wasm32-unknown-unknown/wasm-release/client.wasm

      - name: Install wasm-opt (Binaryen) and zstd
        run: sudo apt-get install -y binaryen zstd

      - name: Optimise WASM with wasm-opt
        run: |
          wasm-opt -Oz --strip-debug --vacuum \
            web-dist/client_bg.wasm \
            -o web-dist/client_bg.wasm

      - name: Compress WASM with ZSTD (maximum compression)
        run: |
          zstd --ultra -22 --long=23 --no-progress \
            web-dist/client_bg.wasm \
            -o web-dist/client_bg.wasm.zst
          mv web-dist/client_bg.wasm.zst web-dist/client_bg.wasm
          echo "Compressed size: $(du -sh web-dist/client_bg.wasm | cut -f1)"

      - name: Copy static web assets
        run: |
          cp web/index.html web-dist/index.html
          cp web/server.txt web-dist/server.txt
          cp web/_headers web-dist/_headers

      - name: Upload WASM artefact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web-dist/
          if-no-files-found: error

      # Deploy to Cloudflare Pages only on main branch.
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          directory: web-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Mark the main-branch deployment as "production" in CF Pages.
          branch: main

  # ── GitHub Release (main branch only, rolling "latest") ─────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download all native build artefacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: "client-*,server-*"

      - name: Download WASM artefact
        uses: actions/download-artifact@v8
        with:
          path: dist/web-dist/
          name: web-dist

      - name: Zip WASM web client
        run: zip -r dist/client-web.zip dist/web-dist/

      - name: List artefacts
        run: find dist/ -type f | sort

      - name: Create or update rolling "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          body: |
            Automated build from the `main` branch — commit ${{ github.sha }}.

            ### Client

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `client-windows-x86_64.exe` | Windows x86-64 | x86-64-v3 (AVX2 + FMA + BMI2) |
            | `client-linux-amd64` | Linux x86-64 | SSE2 baseline — runs on any x86-64 CPU |
            | `client-linux-amd64-v3` | Linux x86-64 | x86-64-v3 (AVX2 + FMA + BMI2) — requires Haswell / Zen 1+ |
            | `client-linux-arm64` | Linux ARM64 | NEON baseline — runs on any AArch64 |
            | `client-linux-arm64-sve` | Linux ARM64 | SVE2 + NEON — requires Graviton 3 / Neoverse V1+ |
            | `client-macos-arm64` | macOS Apple Silicon | NEON (Apple chips do not implement ARM SVE) |
            | `client-web.zip` | Browser (WASM) | Also live on Cloudflare Pages |

            ### Server

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `server-linux-amd64` | Linux x86-64 | SSE2 baseline |
            | `server-linux-amd64-v3` | Linux x86-64 | x86-64-v3 (AVX2 + FMA + BMI2) |
            | `server-linux-arm64` | Linux ARM64 | NEON baseline |
            | `server-linux-arm64-sve` | Linux ARM64 | SVE2 + NEON |
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "dist/client-*/*,dist/server-*/*,dist/client-web.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
