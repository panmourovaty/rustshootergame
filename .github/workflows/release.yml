name: Release

on:
  push:

permissions:
  contents: write
  deployments: write

# ── Required GitHub Secrets ───────────────────────────────────────────────────
#
#   CLOUDFLARE_API_TOKEN      Cloudflare API token with
#                             "Cloudflare Pages: Edit" permission.
#                             Create at https://dash.cloudflare.com/profile/api-tokens
#
#   CLOUDFLARE_ACCOUNT_ID     Your Cloudflare account ID.
#                             Visible in the right-hand sidebar of any zone
#                             or at https://dash.cloudflare.com → select account.
#
#   CLOUDFLARE_PAGES_PROJECT  Name of the Cloudflare Pages project to deploy to.
#                             Create the project once at
#                             https://dash.cloudflare.com → Pages → Create a project
#                             (choose "Direct Upload" - CI will handle all uploads).
#
#   DOCKERHUB_TOKEN           Docker Hub access token (Settings → Security →
#                             New Access Token).  Use a token, not your password.
#                             The Docker Hub username is taken from
#                             github.repository_owner - no extra secret needed.
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Native binaries (client + server) ───────────────────────────────────────
  build-native:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Client - Windows x86-64 (x86-64-v3) ─────────────────────────────
          # Windows 11's minimum supported CPUs (Intel 8th-gen / AMD Zen+)
          # all implement AVX2 + FMA + BMI2, so v3 is the correct baseline.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: client
            artifact_name: client.exe
            asset_name: client-windows-x86_64.exe
            rustflags: "-C target-cpu=x86-64-v3"

          # ── Client - Linux x86-64 (x86-64-v2) ──────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-amd64
            rustflags: "-C target-cpu=x86-64-v2"

          # ── Client - Linux ARM64 NEON baseline ──────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: client
            artifact_name: client
            asset_name: client-linux-arm64
            rustflags: ""

          # ── Client - macOS Apple Silicon (NEON; no SVE on Apple chips) ───────
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: client
            artifact_name: client
            asset_name: client-macos-arm64
            rustflags: ""

          # ── Server - Linux x86-64 (x86-64-v2) ──────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-amd64
            rustflags: "-C target-cpu=x86-64-v2"

          # ── Server - Linux ARM64 NEON baseline ──────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: server
            artifact_name: server
            asset_name: server-linux-arm64
            rustflags: ""

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.binary }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libvulkan-dev \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            pkg-config

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          GIT_HASH: ${{ github.sha }}
        run: >
          cargo build
          --release
          --target ${{ matrix.target }}
          --bin ${{ matrix.binary }}
          ${{ matrix.binary == 'server' && '--no-default-features --features server' || '' }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item `
            "target\${{ matrix.target }}\release\${{ matrix.artifact_name }}" `
            "${{ matrix.asset_name }}"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  # ── WASM web client ──────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM web client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain (with wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-client

      - name: Build WASM binary
        env:
          GIT_HASH: ${{ github.sha }}
        run: >
          cargo build
          --profile wasm-release
          --target wasm32-unknown-unknown
          --bin client
          --no-default-features
          --features web

      - name: Install wasm-bindgen-cli (version matched to Cargo.lock)
        run: |
          VER=$(grep -A2 'name = "wasm-bindgen"' Cargo.lock \
                | grep 'version' | head -1 | cut -d'"' -f2)
          echo "Installing wasm-bindgen-cli $VER"
          cargo install wasm-bindgen-cli --version "=$VER" --locked

      - name: Install wasm-opt (Binaryen) and zstd
        run: sudo apt-get install -y binaryen zstd

      - name: Optimise WASM with wasm-opt (before wasm-bindgen to avoid externref table corruption)
        run: |
          wasm-opt -Oz --strip-debug --vacuum \
            target/wasm32-unknown-unknown/wasm-release/client.wasm \
            -o target/wasm32-unknown-unknown/wasm-release/client.wasm

      - name: Generate JS bindings
        run: |
          mkdir -p web-dist
          wasm-bindgen \
            --out-dir web-dist \
            --target web \
            target/wasm32-unknown-unknown/wasm-release/client.wasm

      - name: Compress WASM with ZSTD (maximum compression)
        run: |
          zstd --ultra -22 --long=23 --no-progress \
            web-dist/client_bg.wasm \
            -o web-dist/client_bg.wasm.zst
          mv web-dist/client_bg.wasm.zst web-dist/client_bg.wasm
          echo "Compressed size: $(du -sh web-dist/client_bg.wasm | cut -f1)"

      - name: Copy static web assets
        run: |
          cp web/index.html web-dist/index.html
          cp web/server.txt web-dist/server.txt
          cp web/_headers web-dist/_headers

      - name: Upload WASM artefact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist/
          if-no-files-found: error

      # Deploy to Cloudflare Pages only on main branch.
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy web-dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Docker image - Alpine Linux server (native builds per arch) ─────────────
  build-docker-amd64:
    name: Build Docker image (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ github.repository_owner }}/rustshootergame-server:${{ github.sha }}-amd64
          build-args: GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

  build-docker-arm64:
    name: Build Docker image (linux/arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ github.repository_owner }}/rustshootergame-server:${{ github.sha }}-arm64
          build-args: GIT_HASH=${{ github.sha }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,mode=max,scope=docker-arm64

  merge-docker:
    name: Merge Docker manifests
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=${{ github.repository_owner }}/rustshootergame-server
          docker buildx imagetools create \
            --tag ${IMAGE}:latest \
            --tag ${IMAGE}:${{ github.sha }} \
            ${IMAGE}:${{ github.sha }}-amd64 \
            ${IMAGE}:${{ github.sha }}-arm64

# ── GitHub Release (main branch only, rolling "latest") ─────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Create dist directory
        run: mkdir -p dist

      - name: Download Native Client Artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: 'client-*'

      - name: Download Native Server Artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: 'server-*'

      - name: Download WASM Artefact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/web-dist

      - name: Zip WASM web client
        run: zip -r dist/client-web.zip dist/web-dist/

      - name: List artefacts (for debugging)
        run: find dist/ -type f | sort
      - name: Create or update rolling "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          commit: ${{ github.sha }}
          name: "Latest Build"
          body: |
            Automated build from the `main` branch - commit ${{ github.sha }}.

            ### Client

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `client-windows-x86_64.exe` | Windows x86-64 | x86-64-v3 (AVX2 + FMA + BMI2) - Windows 11 minimum CPUs all support this |
            | `client-linux-amd64` | Linux x86-64 | x86-64-v2 (SSE4.2 + POPCNT) |
            | `client-linux-arm64` | Linux ARM64 | NEON baseline - runs on any AArch64 |
            | `client-macos-arm64` | macOS Apple Silicon | NEON |
            | `client-web.zip` | Browser (WASM) | Also live on Cloudflare Pages |

            ### Server

            | Binary | Platform | Notes |
            |--------|----------|-------|
            | `server-linux-amd64` | Linux x86-64 | x86-64-v2 (SSE4.2 + POPCNT) |
            | `server-linux-arm64` | Linux ARM64 | NEON baseline - runs on any AArch64 |
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "dist/client-*/*,dist/server-*/*,dist/client-web.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
