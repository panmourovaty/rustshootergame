[package]
name = "rustshootergame"
version = "0.1.0"
edition = "2021"
description = "A Counter Strike inspired FPS game built with Bevy"
license = "MIT"

[[bin]]
name = "rustshootergame"
path = "src/main.rs"

[features]
default = ["networking"]
networking = ["dep:lightyear"]

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "3d",         # full 3D: rendering, lighting, audio, UI, state, logging, winit
    "mouse",      # Bevy 0.18: mouse input is an explicit feature
    "keyboard",   # Bevy 0.18: keyboard input is an explicit feature
    "default_font",
] }
avian3d = "0.5"
lightyear = { version = "0.26", features = ["udp", "client", "server", "netcode"], optional = true }
serde = { version = "1", features = ["derive"] }
clap = { version = "4", features = ["derive"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
