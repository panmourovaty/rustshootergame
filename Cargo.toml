[package]
name = "rustgame"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", default-features = false, features = [
    "multi_threaded",
    "png",
    "wayland",
    "x11",
    "webgpu",
] }
avian3d = { version = "0.6", features = ["3d"] }
bevy_math = "0.18"
lightyear = { version = "0.26", features = ["websocket", "steam"] }
thiserror = "2.0"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = true

[profile.ci]
inherits = "dev"

# Platform-specific features
[features]
default = []
windows = []
linux-vulkan = []
macos-metal = []
